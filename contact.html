<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>聯絡我們 — Vibecode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/">Vibecode</a>
      <nav class="nav">
        <a href="/destinations.html">目的地</a>
        <a href="/about.html">關於</a>
        <a href="/contact.html">聯絡</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:48px 16px;">
    <h1>聯絡我們</h1>
    <p style="color:var(--muted);margin-top:6px;">有合作、建議或錯誤回報，請填寫下面的表單（示範，尚未串接後端）或直接寫信至 <a href="mailto:hello@vibecode.example">hello@vibecode.example</a>。</p>

    <form onsubmit="event.preventDefault(); alert('表單尚未接後端：會在未來加入 API');" style="margin-top:18px;max-width:700px;">
      <label style="display:block;margin-bottom:8px;">
        名稱
        <input type="text" required style="width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #e6e9ef;">
      </label>

      <label style="display:block;margin-bottom:8px;">
        電子郵件
        <input type="email" required style="width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #e6e9ef;">
      </label>

      <label style="display:block;margin-bottom:8px;">
        訊息
        <textarea required rows="6" style="width:100%;padding:10px;margin-top:6px;border-radius:8px;border:1px solid #e6e9ef;"></textarea>
      </label>

      <button type="submit" style="background:var(--accent);color:#fff;padding:12px 18px;border-radius:8px;border:none;cursor:pointer;">送出</button>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Vibecode. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
