<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vibecode Travel — Explore the world</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="logo" href="/">Vibecode</a>
      <nav class="nav">
        <a href="/destinations">目的地</a>
        <a href="/about">關於</a>
        <a href="/contact">聯絡</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <h1>探索全球，簡約旅行靈感</h1>
        <p>機票、行程、靈感。從這裡開始你的下一次旅程。</p>
        <form class="search-bar" onsubmit="event.preventDefault(); alert('搜尋功能尚未接 backend');">
          <input type="search" placeholder="輸入城市、國家或景點" aria-label="搜尋目的地">
          <button type="submit">搜尋</button>
        </form>
      </div>
    </section>

    <section class="popular container">
      <h2>熱門目的地</h2>
      <div class="cards">
        <article class="card">
          <img src="https://picsum.photos/seed/1/800/500" alt="目的地 A">
          <div class="card-body">
            <h3>巴黎, 法國</h3>
            <p>浪漫、藝術與美食。</p>
          </div>
        </article>

        <article class="card">
          <img src="https://picsum.photos/seed/2/800/500" alt="目的地 B">
          <div class="card-body">
            <h3>京都, 日本</h3>
            <p>古寺、茶道與四季之美。</p>
          </div>
        </article>

        <article class="card">
          <img src="https://picsum.photos/seed/3/800/500" alt="目的地 C">
          <div class="card-body">
            <h3>紐西蘭南島</h3>
            <p>自然、徒步與冒險。</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Vibecode. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
